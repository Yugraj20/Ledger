<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger — Personal Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: rgba(255,255,255,0.07);
    --gold: #f0c060;
    --gold2: #e8a830;
    --teal: #38d9a9;
    --red: #ff6b6b;
    --text: #f0eeea;
    --muted: #7a8090;
    --glass: rgba(255,255,255,0.04);
    --shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,192,96,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,192,96,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(240,192,96,0.06) 0%, transparent 70%);
    top: -200px; right: -200px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }

  /* ── TOP NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 0 20px;
    flex-wrap: wrap;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .brand span { color: var(--gold); }

  .nav-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .btn-expense {
    background: rgba(255,107,107,0.15);
    color: var(--red);
    border: 1px solid rgba(255,107,107,0.3);
  }
  .btn-expense:hover { background: rgba(255,107,107,0.25); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(255,107,107,0.2); }

  .btn-income {
    background: rgba(56,217,169,0.12);
    color: var(--teal);
    border: 1px solid rgba(56,217,169,0.3);
  }
  .btn-income:hover { background: rgba(56,217,169,0.22); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(56,217,169,0.2); }

  .btn-date {
    background: rgba(240,192,96,0.12);
    color: var(--gold);
    border: 1px solid rgba(240,192,96,0.3);
  }
  .btn-date:hover { background: rgba(240,192,96,0.22); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(240,192,96,0.2); }

  .btn-primary {
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    color: #1a1200;
    font-weight: 700;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(240,192,96,0.4); }

  .btn-save {
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .btn-save:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }


    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

  /* ── HERO SUMMARY ── */
  .hero {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 40px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }
  .summary-card:hover { transform: translateY(-2px); }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .card-balance::before { background: linear-gradient(90deg, var(--gold), var(--gold2)); }
  .card-income-sum::before { background: linear-gradient(90deg, var(--teal), #20c997); }
  .card-expense-sum::before { background: linear-gradient(90deg, var(--red), #ff9a9a); }

  .summary-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .summary-amount {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
  }
  .card-balance .summary-amount { color: var(--gold); }
  .card-income-sum .summary-amount { color: var(--teal); }
  .card-expense-sum .summary-amount { color: var(--red); }

  .summary-sub {
    font-size: 12px;
    color: var(--muted);
  }

  /* Month bar */
  .month-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .month-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
  }

  /* ── TABS ── */
  .tabs {
    display: flex; gap: 4px;
    background: var(--surface);
    padding: 4px;
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 24px;
    width: fit-content;
  }
  .tab {
    padding: 8px 22px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    background: transparent;
    border: none;
    font-family: 'Syne', sans-serif;
  }
  .tab.active {
    background: var(--surface2);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  /* ── TRANSACTION LIST ── */
  .txn-list { display: flex; flex-direction: column; gap: 10px; }

  .txn-item {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    transition: all 0.2s;
    animation: fadeIn 0.3s ease;
  }
  .txn-item:hover { background: var(--surface2); border-color: rgba(255,255,255,0.1); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .txn-icon {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .icon-expense { background: rgba(255,107,107,0.12); }
  .icon-income { background: rgba(56,217,169,0.12); }

  .txn-info { flex: 1; min-width: 0; }
  .txn-name {
    font-size: 14px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .txn-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .txn-amount {
    font-family: 'Playfair Display', serif;
    font-size: 16px; font-weight: 700;
    flex-shrink: 0;
  }
  .amount-expense { color: var(--red); }
  .amount-income { color: var(--teal); }

  .txn-del {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 16px; padding: 4px;
    transition: color 0.2s; opacity: 0;
    flex-shrink: 0;
  }
  .txn-item:hover .txn-del { opacity: 1; }
  .txn-del:hover { color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
    font-size: 14px;
  }
  .empty-state .big { font-size: 40px; margin-bottom: 10px; }

  /* ── MODAL ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    width: 100%;
    max-width: 440px;
    box-shadow: var(--shadow);
    animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    overflow: hidden;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 700;
  }
  .modal-close {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 20px;
    transition: color 0.2s;
    line-height: 1;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 22px 24px; }

  /* Form */
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s;
    outline: none;
    -webkit-appearance: none;
  }
  .form-input:focus { border-color: rgba(240,192,96,0.4); }
  .form-input::placeholder { color: var(--muted); }

  select.form-input { cursor: pointer; }
  select.form-input option { background: var(--surface2); }

  .modal-footer {
    padding: 0 24px 22px;
    display: flex; gap: 10px; justify-content: flex-end;
  }

  /* ── DATE POPUP (wide) ── */
  .date-modal {
    max-width: 600px;
  }

  .date-modal .tabs { width: 100%; }
  .date-modal .tab { flex: 1; text-align: center; }

  /* ── PROGRESS BAR ── */
  .progress-wrap { margin-top: 14px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar-bg { background: var(--surface2); border-radius: 99px; height: 6px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
  .fill-income { background: linear-gradient(90deg, var(--teal), #20c997); }
  .fill-expense { background: linear-gradient(90deg, var(--red), #ff9a9a); }

  /* ── DATE INPUT STYLING ── */
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

  /* ── RESPONSIVE ── */
  @media (max-width: 720px) {
    .hero { grid-template-columns: 1fr; gap: 12px; }
    .summary-amount { font-size: 26px; }
    nav { padding: 18px 0 14px; }
    .brand { font-size: 22px; }
    .btn { padding: 9px 14px; font-size: 12px; }
    .month-title { font-size: 18px; }
  }
  @media (max-width: 440px) {
    .nav-actions { width: 100%; }
    .nav-actions .btn { flex: 1; justify-content: center; }
    .tabs { width: 100%; }
    .tab { flex: 1; text-align: center; }
  }

  /* Thin scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }

  /* Month nav */
  .month-nav-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; width: 34px; height: 34px;
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .month-nav-btn:hover { background: var(--surface2); color: var(--text); }

  .month-controls { display: flex; align-items: center; gap: 10px; }

  /* Notification toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 13px; font-weight: 600;
    box-shadow: var(--shadow);
    z-index: 200;
    animation: toastIn 0.3s ease;
    display: none;
  }
  .toast.show { display: flex; align-items: center; gap: 10px; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px;
    border-radius: 99px;
    font-size: 11px; font-weight: 700;
  }
  .badge-income { background: rgba(56,217,169,0.2); color: var(--teal); }
  .badge-expense { background: rgba(255,107,107,0.2); color: var(--red); }
</style>
</head>
<body>

<div class="app">
  <!-- NAV -->
  <nav>
    <div class="brand">Led<span>ger</span></div>
    <div class="nav-actions">
      <button class="btn btn-expense" onclick="openModal('expense')">
        <span>−</span> New Expense
      </button>
      <button class="btn btn-income" onclick="openModal('income')">
        <span>+</span> New Income
      </button>
      <button class="btn btn-date" onclick="openDateModal()">
        📅 View by Date
      </button>
      <button class="btn btn-save" onclick="saveToCSV()">
        💾 Save
      </button>
    </div>
  </nav>

  <!-- SUMMARY CARDS -->
  <div class="hero">
    <div class="summary-card card-balance">
      <div class="summary-label">Net Balance</div>
      <div class="summary-amount" id="balance">₹0</div>
      <div class="summary-sub" id="balance-sub">This month</div>
    </div>
    <div class="summary-card card-income-sum">
      <div class="summary-label">Total Income</div>
      <div class="summary-amount" id="total-income">₹0</div>
      <div class="progress-wrap">
        <div class="progress-label"><span id="income-count">0 entries</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill fill-income" id="income-bar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="summary-card card-expense-sum">
      <div class="summary-label">Total Expenses</div>
      <div class="summary-amount" id="total-expense">₹0</div>
      <div class="progress-wrap">
        <div class="progress-label"><span id="expense-count">0 entries</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill fill-expense" id="expense-bar" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- MONTH TRANSACTIONS -->
  <div class="month-header">
    <div class="month-title" id="month-display"></div>
    <div class="month-controls">
      <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
      <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('all', this)">All</button>
    <button class="tab" onclick="switchTab('income', this)">Income</button>
    <button class="tab" onclick="switchTab('expense', this)">Expenses</button>
  </div>

  <div class="txn-list" id="txn-list"></div>
</div>


<!-- ADD TRANSACTION MODAL -->
<div class="overlay" id="add-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">New Expense</div>
      <button class="modal-close" onclick="closeModal('add-modal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="txn-type" value="expense" />
      <div class="form-group">
        <label class="form-label">Description</label>
        <input class="form-input" id="txn-name" placeholder="e.g. Dinner, Salary, Rent…" autocomplete="off" />
      </div>
      <div class="form-group">
        <label class="form-label">Amount (₹)</label>
        <input class="form-input" id="txn-amount" type="number" placeholder="0.00" min="0" step="0.01" />
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-input" id="txn-category">
          <option value="">Select category</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" id="txn-date" type="date" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTransaction()">Save</button>
    </div>
  </div>
</div>


<!-- DATE VIEW MODAL -->
<div class="overlay" id="date-modal">
  <div class="modal date-modal">
    <div class="modal-header">
      <div class="modal-title">View by Date</div>
      <button class="modal-close" onclick="closeModal('date-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Select Date</label>
        <input class="form-input" id="view-date" type="date" oninput="renderDateView()" />
      </div>

      <div class="tabs" style="width:100%;margin-bottom:16px;">
        <button class="tab active" id="dtab-income" onclick="switchDateTab('income')">
          Income <span class="badge badge-income" id="di-count">0</span>
        </button>
        <button class="tab" id="dtab-expense" onclick="switchDateTab('expense')">
          Expenses <span class="badge badge-expense" id="de-count">0</span>
        </button>
      </div>

      <div class="txn-list" id="date-txn-list" style="max-height:320px;overflow-y:auto;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('date-modal')">Close</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>


<script>
  const EXPENSE_CATS = ['🍔 Food & Dining','🛒 Groceries','🚗 Transport','🏠 Rent & Housing','💊 Health','🎬 Entertainment','👗 Shopping','📚 Education','💡 Utilities','📦 Other'];
  const INCOME_CATS  = ['💼 Salary','💰 Freelance','📈 Investments','🎁 Gift','🏦 Business','💵 Other Income'];

  let data = JSON.parse(localStorage.getItem('ledger') || '[]');
  let currentTab = 'all';
  let dateTab = 'income';
  let viewDate = new Date().toISOString().slice(0, 10);
  const now = new Date();
  let viewMonth = now.getMonth();
  let viewYear  = now.getFullYear();

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function save() { localStorage.setItem('ledger', JSON.stringify(data)); }

  function fmt(n) {
    return '₹' + Math.abs(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function openModal(type) {
    const catSel = document.getElementById('txn-category');
    catSel.innerHTML = '<option value="">Select category</option>';
    const cats = type === 'expense' ? EXPENSE_CATS : INCOME_CATS;
    cats.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      catSel.appendChild(o);
    });
    document.getElementById('txn-type').value = type;
    document.getElementById('modal-title').textContent = type === 'expense' ? 'New Expense' : 'New Income';
    document.getElementById('modal-title').style.color = type === 'expense' ? 'var(--red)' : 'var(--teal)';
    document.getElementById('txn-name').value = '';
    document.getElementById('txn-amount').value = '';
    document.getElementById('txn-date').value = new Date().toISOString().slice(0, 10);
    document.getElementById('add-modal').classList.add('open');
    setTimeout(() => document.getElementById('txn-name').focus(), 200);
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
  }

  function openDateModal() {
    document.getElementById('view-date').value = new Date().toISOString().slice(0, 10);
    document.getElementById('date-modal').classList.add('open');
    renderDateView();
  }

  function saveTransaction() {
    const name    = document.getElementById('txn-name').value.trim();
    const amount  = parseFloat(document.getElementById('txn-amount').value);
    const type    = document.getElementById('txn-type').value;
    const cat     = document.getElementById('txn-category').value;
    const date    = document.getElementById('txn-date').value;

    if (!name) { shake('txn-name'); return; }
    if (!amount || amount <= 0) { shake('txn-amount'); return; }
    if (!date) { shake('txn-date'); return; }

    data.push({ id: Date.now(), name, amount, type, cat: cat || '📦 Other', date });
    save();
    closeModal('add-modal');
    renderAll();
    showToast(type === 'expense' ? '🔴 Expense added' : '🟢 Income added');
  }

  function deleteTransaction(id) {
    data = data.filter(t => t.id !== id);
    save();
    renderAll();
    if (document.getElementById('date-modal').classList.contains('open')) renderDateView();
  }

  function getMonthData() {
    return data.filter(t => {
      const d = new Date(t.date);
      return d.getMonth() === viewMonth && d.getFullYear() === viewYear;
    });
  }

  function renderAll() {
    const md = getMonthData();
    const income  = md.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0);
    const expense = md.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0);
    const balance = income - expense;
    const max = Math.max(income, expense) || 1;

    document.getElementById('balance').textContent = (balance < 0 ? '−' : '') + fmt(balance);
    document.getElementById('total-income').textContent  = fmt(income);
    document.getElementById('total-expense').textContent = fmt(expense);
    document.getElementById('income-count').textContent  = md.filter(t=>t.type==='income').length + ' entries';
    document.getElementById('expense-count').textContent = md.filter(t=>t.type==='expense').length + ' entries';
    document.getElementById('income-bar').style.width  = (income / max * 100) + '%';
    document.getElementById('expense-bar').style.width = (expense / max * 100) + '%';
    document.getElementById('month-display').textContent = MONTHS[viewMonth] + ' ' + viewYear;

    let filtered = [...md].sort((a,b) => new Date(b.date) - new Date(a.date));
    if (currentTab !== 'all') filtered = filtered.filter(t => t.type === currentTab);

    const list = document.getElementById('txn-list');
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="big">${currentTab==='expense'?'🚫':currentTab==='income'?'💸':'📭'}</div><div>No ${currentTab==='all'?'transactions':currentTab} this month</div></div>`;
      return;
    }
    list.innerHTML = filtered.map(t => txnHTML(t)).join('');
  }

  function txnHTML(t) {
    const isExp = t.type === 'expense';
    const dStr  = new Date(t.date).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    return `<div class="txn-item">
      <div class="txn-icon ${isExp ? 'icon-expense' : 'icon-income'}">${t.cat.split(' ')[0]}</div>
      <div class="txn-info">
        <div class="txn-name">${escHtml(t.name)}</div>
        <div class="txn-meta">${t.cat.split(' ').slice(1).join(' ')} · ${dStr}</div>
      </div>
      <div class="txn-amount ${isExp ? 'amount-expense' : 'amount-income'}">${isExp ? '−' : '+'}${fmt(t.amount)}</div>
      <button class="txn-del" onclick="deleteTransaction(${t.id})" title="Delete">×</button>
    </div>`;
  }

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tabs:not(.date-modal .tabs) .tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderAll();
  }

  function changeMonth(dir) {
    viewMonth += dir;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
    renderAll();
  }

  function renderDateView() {
    const sel = document.getElementById('view-date').value;
    if (!sel) return;
    viewDate = sel;

    const forDate = data.filter(t => t.date === sel);
    const incomes  = forDate.filter(t => t.type === 'income');
    const expenses = forDate.filter(t => t.type === 'expense');

    document.getElementById('di-count').textContent = incomes.length;
    document.getElementById('de-count').textContent = expenses.length;

    const items = dateTab === 'income' ? incomes : expenses;
    const list = document.getElementById('date-txn-list');

    if (items.length === 0) {
      const d = new Date(sel).toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' });
      list.innerHTML = `<div class="empty-state"><div class="big">${dateTab==='income'?'💰':'🧾'}</div><div>No ${dateTab} on ${d}</div></div>`;
      return;
    }
    list.innerHTML = items.map(t => txnHTML(t)).join('');
  }

  function switchDateTab(tab) {
    dateTab = tab;
    document.getElementById('dtab-income').classList.toggle('active', tab === 'income');
    document.getElementById('dtab-expense').classList.toggle('active', tab === 'expense');
    renderDateView();
  }

  function shake(id) {
    const el = document.getElementById(id);
    el.style.borderColor = 'var(--red)';
    el.animate([{transform:'translateX(-5px)'},{transform:'translateX(5px)'},{transform:'translateX(-4px)'},{transform:'translateX(0)'}], { duration: 300 });
    setTimeout(() => el.style.borderColor = '', 1000);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function escHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Close overlay on backdrop click
  document.querySelectorAll('.overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
  });

  // Enter to save
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('add-modal').classList.contains('open')) saveTransaction();
    if (e.key === 'Escape') document.querySelectorAll('.overlay').forEach(o => o.classList.remove('open'));
  });

  function saveToCSV() {
    if (data.length === 0) { showToast('⚠️ No data to save'); return; }
    const sorted = [...data].sort((a, b) => new Date(a.date) - new Date(b.date));
    const header = ['Date', 'Type', 'Description', 'Category', 'Amount (₹)'];
    const rows = sorted.map(t => [
      t.date,
      t.type.charAt(0).toUpperCase() + t.type.slice(1),
      '"' + t.name.replace(/"/g, '""') + '"',
      '"' + t.cat.replace(/"/g, '""') + '"',
      t.amount.toFixed(2)
    ]);
    const csv = [header, ...rows].map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `ledger-${MONTHS[viewMonth]}-${viewYear}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('✅ Saved as CSV');
  }

  renderAll();
</script>
</body>
</html>
