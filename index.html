<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger — Personal Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0c10; --surface: #111318; --surface2: #181c24;
    --border: rgba(255,255,255,0.07);
    --gold: #f0c060; --gold2: #e8a830;
    --teal: #38d9a9; --red: #ff6b6b;
    --text: #f0eeea; --muted: #7a8090;
    --shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(240,192,96,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(240,192,96,0.03) 1px, transparent 1px);
    background-size: 60px 60px; pointer-events: none; z-index: 0;
  }
  body::after {
    content: ''; position: fixed; width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(240,192,96,0.06) 0%, transparent 70%);
    top: -200px; right: -200px; pointer-events: none; z-index: 0;
  }

  /* ── LOGIN ── */
  #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 500; padding: 20px; }
  .login-card {
    background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px; padding: 48px 40px; max-width: 420px; width: 100%;
    text-align: center; box-shadow: var(--shadow); position: relative; overflow: hidden;
  }
  .login-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--gold2), var(--gold)); }
  .login-brand { font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
  .login-brand span { color: var(--gold); }
  .login-tagline { font-size: 13px; color: var(--muted); margin-bottom: 36px; line-height: 1.7; }
  .login-features { display: flex; flex-direction: column; gap: 10px; margin-bottom: 36px; text-align: left; }
  .login-feature {
    display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--muted);
    background: var(--surface2); border-radius: 10px; padding: 12px 16px; border: 1px solid var(--border);
  }
  .login-feature .icon { font-size: 18px; flex-shrink: 0; }
  .btn-google {
    display: inline-flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%; padding: 14px 24px; background: #fff; color: #1f1f1f;
    border: none; border-radius: 12px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .btn-google:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.4); }
  .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }
  .login-note { margin-top: 16px; font-size: 11px; color: var(--muted); line-height: 1.6; }

  /* ── SYNC STATUS ── */
  .sync-indicator {
    display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted);
    padding: 6px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; transition: all 0.3s;
  }
  .sync-indicator.syncing { color: var(--gold); border-color: rgba(240,192,96,0.3); }
  .sync-indicator.synced  { color: var(--teal); border-color: rgba(56,217,169,0.3); }
  .sync-indicator.error   { color: var(--red);  border-color: rgba(255,107,107,0.3); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .syncing .sync-dot { animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── USER CHIP ── */
  .user-chip {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 12px 5px 5px; cursor: pointer; transition: all 0.2s; position: relative;
  }
  .user-chip:hover { border-color: rgba(255,255,255,0.15); }
  .user-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
  .user-avatar-fallback {
    width: 26px; height: 26px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #1a1200;
  }
  .user-name { font-size: 12px; font-weight: 600; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .user-dropdown {
    position: absolute; top: calc(100% + 8px); right: 0;
    background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
    padding: 8px; min-width: 160px; box-shadow: var(--shadow); z-index: 50; display: none;
  }
  .user-dropdown.open { display: block; }
  .dropdown-item {
    display: flex; align-items: center; gap: 8px; padding: 10px 12px; font-size: 13px; color: var(--muted);
    cursor: pointer; border-radius: 8px; transition: all 0.15s; background: none; border: none;
    width: 100%; text-align: left; font-family: 'Syne', sans-serif;
  }
  .dropdown-item:hover { background: var(--surface2); color: var(--text); }
  .dropdown-item.danger:hover { color: var(--red); }

  /* ── CONFIG BANNER ── */
  #config-banner {
    background: rgba(240,192,96,0.1); border: 1px solid rgba(240,192,96,0.3);
    border-radius: 12px; padding: 14px 18px; margin-bottom: 20px;
    font-size: 13px; color: var(--gold); display: none; align-items: center; gap: 10px;
  }
  #config-banner a { color: var(--gold); text-decoration: underline; cursor: pointer; }

  /* ── APP ── */
  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; display: none; }
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 0 20px; flex-wrap: wrap; gap: 14px;
    border-bottom: 1px solid var(--border); margin-bottom: 36px;
  }
  .nav-left { display: flex; align-items: center; gap: 16px; }
  .brand { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; letter-spacing: -0.5px; color: var(--text); }
  .brand span { color: var(--gold); }
  .nav-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s ease; letter-spacing: 0.3px; white-space: nowrap; }
  .btn-expense { background: rgba(255,107,107,0.15); color: var(--red); border: 1px solid rgba(255,107,107,0.3); }
  .btn-expense:hover { background: rgba(255,107,107,0.25); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(255,107,107,0.2); }
  .btn-income { background: rgba(56,217,169,0.12); color: var(--teal); border: 1px solid rgba(56,217,169,0.3); }
  .btn-income:hover { background: rgba(56,217,169,0.22); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(56,217,169,0.2); }
  .btn-date { background: rgba(240,192,96,0.12); color: var(--gold); border: 1px solid rgba(240,192,96,0.3); }
  .btn-date:hover { background: rgba(240,192,96,0.22); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(240,192,96,0.2); }
  .btn-primary { background: linear-gradient(135deg, var(--gold2), var(--gold)); color: #1a1200; font-weight: 700; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(240,192,96,0.4); }
  .btn-save { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid rgba(255,255,255,0.12); }
  .btn-save:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  .btn-pdf { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
  .btn-pdf:hover { background: rgba(255,255,255,0.1); color: var(--text); transform: translateY(-1px); }

  /* Hero */
  .hero { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 40px; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; position: relative; overflow: hidden; transition: transform 0.2s; }
  .summary-card:hover { transform: translateY(-2px); }
  .summary-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .card-balance::before   { background: linear-gradient(90deg, var(--gold), var(--gold2)); }
  .card-income-sum::before { background: linear-gradient(90deg, var(--teal), #20c997); }
  .card-expense-sum::before { background: linear-gradient(90deg, var(--red), #ff9a9a); }
  .summary-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .summary-amount { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
  .card-balance .summary-amount   { color: var(--gold); }
  .card-income-sum .summary-amount { color: var(--teal); }
  .card-expense-sum .summary-amount { color: var(--red); }
  .summary-sub { font-size: 12px; color: var(--muted); }

  .month-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .month-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; background: var(--surface); padding: 4px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 24px; width: fit-content; }
  .tab { padding: 8px 22px; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--muted); background: transparent; border: none; font-family: 'Syne', sans-serif; }
  .tab.active { background: var(--surface2); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

  /* Transactions */
  .txn-list { display: flex; flex-direction: column; gap: 10px; }
  .txn-item { display: flex; align-items: center; gap: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; transition: all 0.2s; animation: fadeIn 0.3s ease; }
  .txn-item:hover { background: var(--surface2); border-color: rgba(255,255,255,0.1); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .txn-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .icon-expense { background: rgba(255,107,107,0.12); }
  .icon-income  { background: rgba(56,217,169,0.12); }
  .txn-info { flex: 1; min-width: 0; }
  .txn-name { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .txn-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .txn-amount { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; flex-shrink: 0; }
  .amount-expense { color: var(--red); }
  .amount-income  { color: var(--teal); }
  .txn-del { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 4px; transition: color 0.2s; opacity: 0; flex-shrink: 0; }
  .txn-item:hover .txn-del { opacity: 1; }
  .txn-del:hover { color: var(--red); }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 14px; }
  .empty-state .big { font-size: 40px; margin-bottom: 10px; }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; width: 100%; max-width: 440px; box-shadow: var(--shadow); animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1); overflow: hidden; }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .modal-header { padding: 22px 24px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 20px; transition: color 0.2s; line-height: 1; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 22px 24px; }
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; transition: border-color 0.2s; outline: none; -webkit-appearance: none; }
  .form-input:focus { border-color: rgba(240,192,96,0.4); }
  .form-input::placeholder { color: var(--muted); }
  select.form-input { cursor: pointer; }
  select.form-input option { background: var(--surface2); }
  .modal-footer { padding: 0 24px 22px; display: flex; gap: 10px; justify-content: flex-end; }
  .date-modal { max-width: 600px; }
  .date-modal .tabs { width: 100%; }
  .date-modal .tab { flex: 1; text-align: center; }

  /* Progress */
  .progress-wrap { margin-top: 14px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar-bg { background: var(--surface2); border-radius: 99px; height: 6px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
  .fill-income  { background: linear-gradient(90deg, var(--teal), #20c997); }
  .fill-expense { background: linear-gradient(90deg, var(--red), #ff9a9a); }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

  /* Month nav */
  .month-nav-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; width: 34px; height: 34px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .month-nav-btn:hover { background: var(--surface2); color: var(--text); }
  .month-controls { display: flex; align-items: center; gap: 10px; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 20px; font-size: 13px; font-weight: 600; box-shadow: var(--shadow); z-index: 200; display: none; }
  .toast.show { display: flex; align-items: center; gap: 10px; }

  .badge { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 99px; font-size: 11px; font-weight: 700; }
  .badge-income  { background: rgba(56,217,169,0.2);  color: var(--teal); }
  .badge-expense { background: rgba(255,107,107,0.2); color: var(--red); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }

  @media (max-width: 720px) { .hero { grid-template-columns: 1fr; gap: 12px; } .summary-amount { font-size: 26px; } nav { padding: 18px 0 14px; } .brand { font-size: 22px; } .btn { padding: 9px 14px; font-size: 12px; } .month-title { font-size: 18px; } }
  @media (max-width: 440px) { .nav-actions { width: 100%; } .nav-actions .btn { flex: 1; justify-content: center; } .tabs { width: 100%; } .tab { flex: 1; text-align: center; } }

  /* ── PRINT ── */
  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body { background: #fff !important; color: #111 !important; }
    body::before, body::after { display: none; }
    #login-screen, nav, .tabs, .month-nav-btn, .btn-pdf, .btn-save, .btn-expense, .btn-income, .btn-date, .txn-del, .toast, .overlay, #config-banner { display: none !important; }
    .app { max-width: 100%; padding: 0; display: block !important; }
    .print-header { display: flex !important; align-items: center; justify-content: space-between; border-bottom: 2px solid #e8a830; padding-bottom: 12px; margin-bottom: 22px; }
    .print-header .brand { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; color: #111; }
    .print-header .brand span { color: #e8a830; }
    .print-header .print-period { font-size: 14px; color: #555; font-weight: 600; }
    .summary-card { background: #f8f8f8 !important; border: 1px solid #ddd !important; border-radius: 12px; break-inside: avoid; }
    .summary-card::before { display: block !important; height: 3px !important; }
    .card-balance::before    { background: linear-gradient(90deg, #f0c060, #e8a830) !important; }
    .card-income-sum::before  { background: linear-gradient(90deg, #38d9a9, #20c997) !important; }
    .card-expense-sum::before { background: linear-gradient(90deg, #ff6b6b, #ff9a9a) !important; }
    .summary-label { color: #777 !important; }
    .card-balance .summary-amount    { color: #b07800 !important; }
    .card-income-sum .summary-amount  { color: #1a9e78 !important; }
    .card-expense-sum .summary-amount { color: #cc3333 !important; }
    .progress-bar-bg { background: #e0e0e0 !important; }
    .txn-item { background: #f8f8f8 !important; border: 1px solid #ddd !important; break-inside: avoid; }
    .txn-name { color: #111 !important; } .txn-meta { color: #777 !important; }
    .amount-expense { color: #cc3333 !important; } .amount-income { color: #1a9e78 !important; }
    .print-footer { display: block !important; margin-top: 28px; padding-top: 12px; border-top: 1px solid #ddd; font-size: 11px; color: #aaa; text-align: center; }
  }
  .print-header, .print-footer { display: none; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-brand">Led<span>ger</span></div>
    <div class="login-tagline">Your personal finance tracker.<br>Sign in to sync your data across all devices.</div>
    <div class="login-features">
      <div class="login-feature"><span class="icon">🔒</span><span>Data stored privately in <strong>your own Google Drive</strong></span></div>
      <div class="login-feature"><span class="icon">🌐</span><span>Access from any device, anywhere</span></div>
      <div class="login-feature"><span class="icon">☁️</span><span>Auto-saves to Drive after every change</span></div>
    </div>
    <button class="btn-google" id="sign-in-btn" onclick="signIn()">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Continue with Google
    </button>
    <div class="login-note">Ledger only requests access to files it creates
